# CI — AgroPulse (agropulse-web)
# Lint + build + smoke tests E2E con Playwright.
# Sin envs de Supabase: el store usa el fallback in-memory,
# suficiente para build y tests read-mostly.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Lint, build y E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agropulse-web
    env:
      AUTH_SECRET: ci-dummy
      AUTH_TRUST_HOST: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agropulse-web/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Instalar Chromium (Playwright)
        run: npx playwright install chromium --with-deps

      - name: Smoke tests E2E
        run: npm run test:e2e

      - name: Subir reporte Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            agropulse-web/playwright-report/
            agropulse-web/test-results/
          if-no-files-found: ignore
          retention-days: 7
